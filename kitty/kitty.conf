# ============================================================================
# Kitty — Tokyo Night setup
# ============================================================================

# ---------- Shell ----------
shell zsh
shell_integration enabled

# ---------- Theme ----------
# Switch between tokyonight_moon / storm / night
include ~/tokyo_theme/extras/kitty/tokyonight_moon.conf

# ---------- Window ----------
initial_window_width  140c
initial_window_height 70c

background_opacity   0.95
background_tint      0.98
background_tint_gaps -5.0

window_padding_width 2

background_image        ~/dotfiles/media/moon-landscape-scenery.jpg
background_image_layout scaled
background_image_linear no

# ---------- Cursor ----------
cursor_shape block
cursor_blink_interval 0.5
cursor            #c0caf5
cursor_text_color #1a1b26

# Cursor trail (kitty 0.36+). Comment out on older versions.
cursor_trail                 200
cursor_trail_decay           0.08 0.33
cursor_trail_start_threshold 2

# ---------- Borders ----------
window_border_width   0.6pt
active_border_color   #7aa2f7
inactive_border_color #3b4261

# ---------- Fonts ----------
font_family      MesloLGS NF Regular
bold_font        MesloLGS NF Bold
italic_font      MesloLGS NF Italic
bold_italic_font MesloLGS NF Bold Italic

font_size          14.0
adjust_line_height 2
disable_ligatures  never

# ---------- Scrolling ----------
scrollback_lines        20000
wheel_scroll_multiplier 2.5

# ---------- Rendering ----------
sync_to_monitor yes
repaint_delay   6
input_delay     0
enable_audio_bell no

# ---------- Tabs ----------
tab_bar_style         powerline
tab_powerline_style   slanted
tab_title_template    "{index}: {title}"
active_tab_font_style bold
inactive_tab_font_style normal
tab_separator         " "

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5

# ---------- Layouts / splits ----------
enabled_layouts Tall, Stack, Fat, Grid, *

map ctrl+shift+l launch --location=hsplit
map ctrl+shift+j launch --location=vsplit
map ctrl+shift+w close_window

# ---------- Clipboard & hints ----------
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+e launch --type=overlay kitten hints
map ctrl+shift+f launch --type=overlay fzf
map ctrl+shift+u launch --type=overlay kitten unicode_input

# ---------- Remote control ----------
# Lock this down on shared machines — anyone with the socket path can drive kitty.
allow_remote_control yes
listen_on            unix:@kitty

# ---------- Key modifier ----------
kitty_mod ctrl+shift