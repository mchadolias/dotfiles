###############################################################################
# CORE SETTINGS
###############################################################################

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

set -s escape-time 0
set -g focus-events on
set -g mouse on
set -g history-limit 10000

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on


###############################################################################
# PREFIX & KEYBINDINGS
###############################################################################

set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Resize panes
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 5
bind -n M-Down  resize-pane -D 5

# Windows
bind c new-window -c "#{pane_current_path}"
bind x kill-pane
bind X kill-window

# Reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"

# Sessions
bind -n M-1 switch-client -t 1
bind -n M-2 switch-client -t 2
bind P run-shell "tmux new-session -A -s $(basename $PWD)"


###############################################################################
# STATUS BAR (TOKYO NIGHT OWNS STYLING)
###############################################################################

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-left-length 90
set -g status-right-length 150

# Let Tokyo Night handle colors
set -g status-style bg=default


###############################################################################
# SSH / ENVIRONMENT DETECTION
###############################################################################

# SSH detection
set -g @is_ssh "#{?SSH_CONNECTION,1,0}"

# Hostname
set -g @host_name "#H"

# Detect prod-like hosts (edit patterns if needed)
set -g @is_prod "#{||:#{m:prod,#{@host_name}},#{m:login,#{@host_name}}}"

# Cluster name (safe, fast)
set -g @kube_ctx "#(kubectl config current-context 2>/dev/null)"


###############################################################################
# TOKYO NIGHT THEME
###############################################################################

set -g @plugin "janoamaral/tokyo-night-tmux"

set -g @tokyo-night-tmux_theme storm
set -g @tokyo-night-tmux_window_id_style digital
set -g @tokyo-night-tmux_pane_id_style hsquare
set -g @tokyo-night-tmux_zoom_id_style dsquare

set -g @tokyo-night-tmux_terminal_icon 
set -g @tokyo-night-tmux_active_terminal_icon 

set -g @tokyo-night-tmux_window_tidy_icons 0


###############################################################################
# SMART STATUS WIDGETS
###############################################################################

# Battery (local laptops only)
set -g @tokyo-night-tmux_show_battery_widget 1
set -g @tokyo-night-tmux_battery_name "BAT0"

# Music (disable on SSH)
set -g @tokyo-night-tmux_show_music "#{?@is_ssh,0,1}"

# Network widgets off (too noisy / slow)
set -g @tokyo-night-tmux_show_netspeed 0

# Date & time
set -g @tokyo-night-tmux_show_datetime 1
set -g @tokyo-night-tmux_time_format 24H
set -g @tokyo-night-tmux_date_format "%Y-%m-%d"

# Git in status bar disabled (Starship already handles it)
set -g @tokyo-night-tmux_show_git 0


###############################################################################
# PLUGINS
###############################################################################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'jrmoulton/tmux-sessionizer'


###############################################################################
# TPM INIT 
###############################################################################

run '$XDG_DATA_HOME/tmux/plugins/tpm/tpm'
